name: Daily Brief Robot

on:
  schedule:
    - cron: '0 7 * * *'  # Heure d'hiver (CET = UTC+1) → 08:00 Paris
    - cron: '0 6 * * *'  # Heure d'été  (CEST = UTC+2) → 08:00 Paris
  workflow_dispatch: # Permet de lancer manuellement pour tester

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npx tsc

      - name: Execute Robot
        run: node dist/index.js
        env:
          NEWSDATA_API_KEY: ${{ secrets.NEWSDATA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MY_EMAIL: ${{ secrets.MY_EMAIL }}
          LATITUDE: ${{ secrets.LATITUDE }}
          LONGITUDE: ${{ secrets.LONGITUDE }}

      - name: Commit Archives & Web Updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 🗄️ Mise à jour des archives web et du cache"
          file_pattern: 'docs/* .news_cache.json'